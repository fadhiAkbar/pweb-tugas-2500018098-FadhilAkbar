<!DOCTYPE html>
<html>
<head>
    <title>Tabel HTML</title>
</head>
<body>

    <h1>Contoh Tabel HTML</h1>

    <table border="1" cellpadding="10" cellspacing="0">

        <tr bgcolor="lightblue">
            <th>No</th>
            <th>Nama</th>
            <th>Kelas</th>
            <th>Mata Kuliah</th>
            <th>Nilai</th>
        </tr>

        <tr>
            <td>1</td>
            <td>Fadhil Akbar</td>
            <td>IF-A</td>
            <td>Pemrograman Web</td>
            <td>90</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Andi</td>
            <td>IF-B</td>
            <td>Basis Data</td>
            <td>85</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Budi</td>
            <td>IF-C</td>
            <td>Algoritma</td>
            <td>88</td>
        </tr>

        <tr bgcolor="lightgray">
            <td colspan="4" align="center">
                Rata-rata Nilai
            </td>
            <td>87</td>
        </tr>

    </table>

</body>
</html>
